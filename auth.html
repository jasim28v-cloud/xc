<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | SHΔDØW</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 10%, #0a0a0a, #000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(254,44,85,0.3);
            box-shadow: 0 0 40px rgba(254,44,85,0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-card h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 30px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        
        .login-card input:focus {
            border-color: #fe2c55;
            background: rgba(254,44,85,0.1);
        }
        
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(254,44,85,0.4);
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .auth-tab.active {
            background: #fe2c55;
            color: white;
            box-shadow: 0 0 15px rgba(254,44,85,0.5);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }
        
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>SHΔDØW</h1>
    <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
        <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="auth-form active">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <button id="loginBtn">دخول</button>
        <div id="loginMsg" class="error-msg"></div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="auth-form">
        <input type="text" id="regName" placeholder="اسم المستخدم" autocomplete="name">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)" autocomplete="new-password">
        <button id="registerBtn">إنشاء حساب</button>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    // ==================== SHΔDØW Auth Page ====================
    
    function switchAuth(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        if (type === 'login') document.querySelectorAll('.auth-tab')[0].classList.add('active');
        else document.querySelectorAll('.auth-tab')[1].classList.add('active');
        
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Form').classList.add('active');
        
        clearErrors();
    }
    
    function clearErrors() {
        document.getElementById('loginMsg').innerHTML = '';
        document.getElementById('regMsg').innerHTML = '';
    }
    
    function showError(elementId, message) {
        const errorDiv = document.getElementById(elementId);
        errorDiv.innerHTML = message;
        setTimeout(() => {
            if (errorDiv) errorDiv.innerHTML = '';
        }, 5000);
    }
    
    function setLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.innerHTML = '<span class="loading"></span> جاري...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.innerHTML = originalText;
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }
    
    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('loginMsg', '⚠️ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
            return;
        }
        
        setLoading('loginBtn', true, 'دخول');
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            // Check if user exists in database
            const snapshot = await db.ref(`users/${user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    username: email.split('@')[0],
                    email: email,
                    bio: '',
                    avatarUrl: '',
                    followers: {},
                    following: {},
                    totalLikes: 0,
                    createdAt: Date.now()
                });
            }
            
            setLoading('loginBtn', false, 'دخول');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('loginBtn', false, 'دخول');
            let msg = '';
            switch (error.code) {
                case 'auth/user-not-found': msg = '❌ لا يوجد حساب بهذا البريد'; break;
                case 'auth/wrong-password': msg = '❌ كلمة المرور غير صحيحة'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/too-many-requests': msg = '❌ تم تعطيل الحساب مؤقتاً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('loginMsg', msg);
        }
    });
    
    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const username = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        
        if (!username || !email || !password) {
            showError('regMsg', '⚠️ الرجاء ملء جميع الحقول');
            return;
        }
        
        if (password.length < 6) {
            showError('regMsg', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            return;
        }
        
        setLoading('registerBtn', true, 'إنشاء حساب');
        
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            
            await db.ref(`users/${userCredential.user.uid}`).set({
                username: username,
                email: email,
                bio: '',
                avatarUrl: '',
                followers: {},
                following: {},
                totalLikes: 0,
                createdAt: Date.now()
            });
            
            setLoading('registerBtn', false, 'إنشاء حساب');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('registerBtn', false, 'إنشاء حساب');
            let msg = '';
            switch (error.code) {
                case 'auth/email-already-in-use': msg = '❌ البريد الإلكتروني مستخدم بالفعل'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/weak-password': msg = '❌ كلمة المرور ضعيفة جداً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('regMsg', msg);
        }
    });
    
    // Check if already logged in
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
