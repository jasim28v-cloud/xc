<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHΔDØW - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 10%, #0a0a0a, #000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(254,44,85,0.3);
            box-shadow: 0 0 40px rgba(254,44,85,0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 30px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
        }
        .login-card input:focus {
            outline: none;
            border-color: #fe2c55;
            background: rgba(254,44,85,0.1);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-card button:hover { transform: scale(1.02); }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: #fe2c55;
            color: white;
            box-shadow: 0 0 15px rgba(254,44,85,0.5);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>SHΔDØW</h1>
    <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
        <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
    </div>
    <div id="loginForm" class="auth-form active">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div id="loginMsg" class="error-msg"></div>
    </div>
    <div id="registerForm" class="auth-form">
        <input type="text" id="regName" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
        <button onclick="register()">إنشاء حساب</button>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    const ADMIN_EMAILS = ['jasim28v@gmail.com']; // بريد الأدمن

    function switchAuth(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Form').classList.add('active');
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msg = document.getElementById('loginMsg');
        if (!email || !password) { msg.innerText = 'الرجاء ملء جميع الحقول'; return; }
        msg.innerText = 'جاري تسجيل الدخول...';
        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'index.html';
        } catch (error) {
            if (error.code === 'auth/user-not-found') msg.innerText = 'لا يوجد حساب';
            else if (error.code === 'auth/wrong-password') msg.innerText = 'كلمة المرور غير صحيحة';
            else msg.innerText = 'حدث خطأ: ' + error.message;
        }
    }

    async function register() {
        const username = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const msg = document.getElementById('regMsg');
        if (!username || !email || !password) { msg.innerText = 'املأ جميع الحقول'; return; }
        if (password.length < 6) { msg.innerText = 'كلمة المرور 6 أحرف على الأقل'; return; }
        msg.innerText = 'جاري إنشاء الحساب...';
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;
            await db.ref(`users/${user.uid}`).set({
                uid: user.uid,
                username: username,
                email: email,
                bio: '',
                avatarUrl: '',
                followers: {},
                following: {},
                totalLikes: 0,
                createdAt: Date.now(),
                isAdmin: ADMIN_EMAILS.includes(email)
            });
            window.location.href = 'index.html';
        } catch (error) {
            if (error.code === 'auth/email-already-in-use') msg.innerText = 'البريد مستخدم';
            else msg.innerText = 'حدث خطأ: ' + error.message;
        }
    }

    // إذا كان المستخدم مسجلاً بالفعل، انتقل مباشرة إلى التطبيق
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
