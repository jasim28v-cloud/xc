<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETERNA_ULTRA | المكتمل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@700&display=swap');
        
        :root { --neon: #ff007f; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* محرك التمرير المكتمل */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* تأثير الثقب الأسود (تلاشي الحواف فقط) */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
            filter: brightness(0.95) contrast(1.1);
            transition: 0.8s ease;
        }

        /* الهيدر الفخم */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 30px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-name { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; letter-spacing: 6px; color: #fff; text-shadow: 0 0 20px var(--neon); pointer-events: auto; }

        /* الأزرار الجانبية الكريستالية */
        .side-ops { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .op-btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; }
        .op-btn i { font-size: 20px; color: var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }

        /* الصحن السفلي (المفاعل) */
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .core-btn { width: 65px; height: 65px; background: linear-gradient(135deg, var(--neon), #444); border-radius: 50%; margin-top: -45px; border: 4px solid #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon); cursor: pointer; }

        /* لوحات التحكم */
        .glass-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.96); backdrop-filter: blur(40px); display: none; flex-direction: column; padding: 40px 25px; border-top: 5px solid var(--neon); }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">AETERNA_ULTRA</div>
        <div class="font-mono text-[10px] text-white/50" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="text-white/20 cursor-pointer" onclick="checkAdmin()"><i class="fas fa-fingerprint text-2xl"></i></div>
        <div class="core-btn" onclick="toggleCore()"><i class="fas fa-satellite-dish text-white text-2xl"></i></div>
        <div class="text-white/20 cursor-pointer" onclick="navigator.share({url:window.location.href})"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="core-panel" class="glass-panel">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <h2 class="font-[Orbitron] text-xl font-bold" style="color: var(--neon)">ULTRA_CORE</h2>
            <div class="flex gap-10">
                <i class="fas fa-cloud-arrow-up text-2xl text-white cursor-pointer" onclick="openUpload()"></i>
                <i class="fas fa-times text-2xl text-red-500 cursor-pointer" onclick="toggleCore()"></i>
            </div>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 px-2 text-sm"></div>
        <div class="flex gap-3 mt-6">
            <input type="text" id="msg-input" class="flex-1 bg-white/5 p-4 rounded-xl border border-white/10 text-white outline-none" placeholder="اكتب هنا...">
            <button onclick="sendMsg()" class="px-8 rounded-xl font-bold" style="background: var(--neon); color: #000;">إرسال</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const ADS = { audio: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp", like: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90" };
        const COLORS = ['#ff007f', '#00f2ff', '#00ffaa', '#bd00ff', '#ffd700'];

        firebase.initializeApp({ databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" });
        const db = firebase.database();

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // تحميل الفيديوهات
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val(); container.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-segment';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline muted data-src="${vid.url}"></video>
                    <div class="side-ops">
                        <div class="op-btn" onclick="window.open('${ADS.like}', '_blank'); likeVideo('${id}')"><i class="fas fa-medal"></i></div>
                        <div class="op-btn" onclick="window.open('${ADS.audio}', '_blank'); toggleMute('${id}')"><i class="fas fa-walkie-talkie"></i></div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        // مراقبة التمرير وتغيير الألوان
        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{});
                        const nextCol = COLORS[Math.floor(Math.random()*COLORS.length)];
                        document.documentElement.style.setProperty('--neon', nextCol);
                    } else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-segment').forEach(s => obs.observe(s));
        }

        function toggleCore() { const p = document.getElementById('core-panel'); p.style.display = (p.style.display==='flex')?'none':'flex'; }
        function sendMsg() { const i = document.getElementById('msg-input'); if(i.value.trim()){ db.ref('chat').push({user:"USR", text:i.value}); i.value=''; } }
        db.ref('chat').limitToLast(12).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(m => { b.innerHTML += `<div class="p-3 bg-white/5 border-r-2" style="border-color: var(--neon)"><b>User:</b> ${m.val().text}</div>`; });
            b.scrollTop = b.scrollHeight;
        });

        const widget = cloudinary.createUploadWidget({ cloudName: "dpcysggzh", uploadPreset: "poro_go", sources: ['local'] }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0 });
        });
        function openUpload() { widget.open(); }
        function likeVideo(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function toggleMute(id) { const v = document.getElementById('vid-'+id); v.muted = !v.muted; }
        function checkAdmin() { if(prompt("SCAN ID:") === MASTER_KEY) alert("ADMIN_ACCESS_OK"); }
    </script>
</body>
</html>
