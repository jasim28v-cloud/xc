<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TikTok Clone | Ultra Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        /* شاشة تسجيل الدخول */
        .login-screen { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #111; border-radius: 24px; padding: 40px 24px; width: 90%; max-width: 350px; text-align: center; }
        .login-card h1 { font-size: 32px; font-weight: bold; margin-bottom: 30px; color: #fe2c55; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #222; border: none; color: white; }
        .login-card button { width: 100%; padding: 14px; margin-top: 20px; background: #fe2c55; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; background: none; border: none; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: #fe2c55; border-bottom-color: #fe2c55; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100vh; background: #000; }
        
        /* شريط علوي */
        .top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 12px 20px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); }
        .top-bar span { font-weight: bold; font-size: 17px; }
        .top-bar span:first-child { color: #fe2c55; }
        .top-bar span:last-child { color: white; }
        
        /* حاوية الفيديوهات */
        .videos-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .videos-container::-webkit-scrollbar { display: none; }
        .video-item { height: 100vh; scroll-snap-align: start; position: relative; background: #000; margin-bottom: 2px; /* فاصلة بسيطة */ }
        .video-item video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        /* معلومات الفيديو */
        .video-info { position: absolute; bottom: 100px; left: 16px; right: 80px; z-index: 20; }
        .author-info { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .author-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #fe2c55, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 2px solid white; object-fit: cover; overflow: hidden; }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .author-name { font-weight: bold; font-size: 17px; cursor: pointer; }
        .follow-btn { background: #fe2c55; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 8px; cursor: pointer; border: none; color: white; }
        .video-caption { font-size: 14px; margin-bottom: 8px; line-height: 1.3; }
        .video-music { font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 5px; }
        .hashtag { color: #fe2c55; cursor: pointer; }
        
        /* الأزرار الجانبية */
        .side-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 20; }
        .side-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: white; cursor: pointer; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .side-btn:active { transform: scale(0.9); }
        .side-btn i { font-size: 32px; }
        .side-btn.active i { color: #fe2c55; }
        
        /* رسالة تم النسخ */
        .copy-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 30px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .copy-toast.show { opacity: 1; }
        
        /* تأثير القلب عند الضغط مرتين */
        .heart-animation { position: fixed; font-size: 80px; color: #fe2c55; pointer-events: none; z-index: 1000; animation: heartFloat 0.8s ease-out forwards; }
        @keyframes heartFloat { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }
        
        /* شريط سفلي */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; padding: 10px 0 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 10px; }
        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #fe2c55; }
        .create-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #fe2c55, #ff6b6b); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; cursor: pointer; }
        
        /* لوحة المشاركة */
        .share-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-radius: 20px 20px 0 0; z-index: 300; transform: translateY(100%); transition: 0.3s; padding: 20px; }
        .share-panel.open { transform: translateY(0); }
        .share-option { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        /* لوحة التعليقات */
        .comments-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-radius: 20px 20px 0 0; max-height: 70vh; overflow-y: auto; z-index: 200; transform: translateY(100%); transition: 0.3s; padding: 20px; }
        .comments-panel.open { transform: translateY(0); }
        .comment-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #fe2c55; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .add-comment { display: flex; gap: 10px; padding: 12px; background: #1a1a1a; border-radius: 30px; margin-top: 10px; }
        .add-comment input { flex: 1; background: none; border: none; color: white; outline: none; }
        
        /* لوحة البحث */
        .search-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 300; padding: 60px 20px 20px; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        .search-panel.open { transform: translateX(0); }
        .search-input { width: 100%; padding: 12px 16px; border-radius: 30px; background: #222; border: none; color: white; margin-bottom: 20px; }
        .search-result { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .search-avatar { width: 48px; height: 48px; border-radius: 50%; background: #fe2c55; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .search-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* لوحة الإشعارات */
        .notifications-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 300; padding: 60px 20px 20px; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        .notifications-panel.open { transform: translateX(0); }
        .notification-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* صفحة الملف الشخصي */
        .profile-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 400; overflow-y: auto; transform: translateX(100%); transition: 0.3s; }
        .profile-panel.open { transform: translateX(0); }
        .profile-header { text-align: center; padding: 50px 20px 30px; background: linear-gradient(135deg, #fe2c55, #ff6b6b); }
        .profile-avatar-large { width: 96px; height: 96px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; border: 3px solid white; overflow: hidden; cursor: pointer; }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-stats { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-number { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .edit-profile-btn, .logout-btn { background: rgba(255,255,255,0.1); border: none; padding: 10px 24px; border-radius: 30px; color: white; margin: 0 8px; cursor: pointer; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .videos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        .video-thumb { aspect-ratio: 9/16; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* لوحة تعديل الملف الشخصي */
        .edit-profile-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 500; padding: 60px 20px 20px; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        .edit-profile-panel.open { transform: translateX(0); }
        .edit-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; background: #222; border: none; color: white; }
        .avatar-upload { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .avatar-upload .profile-avatar-large { margin-bottom: 10px; cursor: pointer; }
        
        .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #888; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>TikTok</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="text-red-500 text-sm text-center mt-2"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="text-red-500 text-sm text-center mt-2"></div>
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp">
    <div class="top-bar">
        <span>متابَعين</span>
        <span>لك</span>
    </div>

    <div class="videos-container" id="videosContainer">
        <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> جاري التحميل...</div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-item" onclick="switchTab('search')"><i class="fas fa-search"></i><span>بحث</span></button>
        <div class="create-btn" onclick="openUpload()"><i class="fas fa-plus"></i></div>
        <button class="nav-item" onclick="switchTab('notifications')"><i class="fas fa-heart"></i><span>الإشعارات</span></button>
        <button class="nav-item" onclick="openProfile(currentUser?.uid)"><i class="fas fa-user"></i><span>الملف</span></button>
    </div>

    <!-- رسالة تم النسخ -->
    <div id="copyToast" class="copy-toast">✅ تم نسخ الرابط</div>

    <!-- لوحة المشاركة -->
    <div id="sharePanel" class="share-panel">
        <div class="flex justify-between items-center mb-4"><h3>إرسال إلى</h3><i class="fas fa-times cursor-pointer" onclick="closeShare()"></i></div>
        <div class="share-option" onclick="copyLink()"><i class="fas fa-link text-blue-400"></i><span>نسخ الرابط</span></div>
        <div class="share-option" onclick="shareToWhatsApp()"><i class="fab fa-whatsapp text-green-500"></i><span>WhatsApp</span></div>
        <div class="share-option" onclick="shareToTelegram()"><i class="fab fa-telegram text-blue-400"></i><span>Telegram</span></div>
        <div class="share-option" onclick="downloadVideo()"><i class="fas fa-download text-gray-400"></i><span>تنزيل</span></div>
    </div>

    <!-- لوحة التعليقات -->
    <div id="commentsPanel" class="comments-panel">
        <div class="flex justify-between items-center mb-4"><h3>التعليقات</h3><i class="fas fa-times cursor-pointer" onclick="closeComments()"></i></div>
        <div id="commentsList"></div>
        <div class="add-comment"><input type="text" id="commentInput" placeholder="أضف تعليقاً..."><button onclick="addComment()" style="color:#fe2c55">نشر</button></div>
    </div>

    <!-- لوحة البحث -->
    <div id="searchPanel" class="search-panel">
        <div class="flex justify-between items-center mb-4"><h3>بحث</h3><i class="fas fa-times cursor-pointer" onclick="closeSearch()"></i></div>
        <input type="text" id="searchInput" class="search-input" placeholder="بحث عن مستخدمين..." onkeyup="searchUsers()">
        <div id="searchResults"></div>
    </div>

    <!-- لوحة الإشعارات -->
    <div id="notificationsPanel" class="notifications-panel">
        <div class="flex justify-between items-center mb-4"><h3>الإشعارات</h3><i class="fas fa-times cursor-pointer" onclick="closeNotifications()"></i></div>
        <div id="notificationsList"></div>
    </div>

    <!-- صفحة الملف الشخصي -->
    <div id="profilePanel" class="profile-panel">
        <div class="back-btn" onclick="closeProfile()"><i class="fas fa-arrow-right"></i></div>
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarDisplay" onclick="changeAvatar()">👤</div>
            <h2 id="profileNameDisplay" class="mt-4 text-xl"></h2>
            <p id="profileBioDisplay" class="text-sm opacity-70 mt-1"></p>
            <div class="profile-stats">
                <div class="stat"><div class="stat-number" id="profileFollowing">0</div><div class="stat-label">يتابع</div></div>
                <div class="stat"><div class="stat-number" id="profileFollowers">0</div><div class="stat-label">متابع</div></div>
                <div class="stat"><div class="stat-number" id="profileLikes">0</div><div class="stat-label">إعجاب</div></div>
            </div>
            <div id="profileActions"></div>
        </div>
        <div class="p-4">
            <h4 class="mb-2">فيديوهات</h4>
            <div id="profileVideosList" class="videos-grid"></div>
        </div>
    </div>

    <!-- لوحة تعديل الملف الشخصي -->
    <div id="editProfilePanel" class="edit-profile-panel">
        <div class="flex justify-between items-center mb-4"><h3>تعديل الملف الشخصي</h3><i class="fas fa-times cursor-pointer" onclick="closeEditProfile()"></i></div>
        <div class="avatar-upload" onclick="changeAvatar()">
            <div class="profile-avatar-large" id="editAvatarDisplay">👤</div>
            <p class="text-xs text-gray-400">اضغط لتغيير الصورة</p>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <input type="text" id="editUsername" class="edit-input" placeholder="اسم المستخدم">
        <textarea id="editBio" class="edit-input" rows="3" placeholder="السيرة الذاتية"></textarea>
        <button onclick="saveProfile()" class="w-full bg-[#fe2c55] p-3 rounded-xl mt-4">حفظ</button>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
