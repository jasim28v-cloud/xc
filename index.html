<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHΔDØW | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        .login-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at 30% 10%, #0a0a0a, #000); display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-radius: 32px; padding: 40px 28px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(254,44,85,0.3); box-shadow: 0 0 40px rgba(254,44,85,0.2); animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-card h1 { font-size: 38px; font-weight: 900; background: linear-gradient(135deg, #fe2c55, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .login-card input { width: 100%; padding: 14px 18px; margin: 10px 0; border-radius: 30px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 15px; }
        .login-card input:focus { outline: none; border-color: #fe2c55; background: rgba(254,44,85,0.1); }
        .login-card button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(135deg, #fe2c55, #ff6b6b); border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); border-radius: 60px; padding: 4px; }
        .auth-tab { flex: 1; padding: 12px; background: none; border: none; color: #888; cursor: pointer; border-radius: 60px; transition: all 0.3s; }
        .auth-tab.active { background: #fe2c55; color: white; box-shadow: 0 0 15px rgba(254,44,85,0.5); }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .text-red-500 { color: #ef4444; }
        .text-sm { font-size: 0.875rem; }
        .text-center { text-align: center; }
        .mt-3 { margin-top: 0.75rem; }
    </style>
</head>
<body>

<div class="login-screen">
    <div class="login-card">
        <h1>SHΔDØW</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTabBtn">تسجيل الدخول</button>
            <button class="auth-tab" id="registerTabBtn">إنشاء حساب</button>
        </div>
        
        <div id="loginFormDiv" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button id="doLoginBtn">دخول</button>
            <div id="loginMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
        
        <div id="registerFormDiv" class="auth-form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
            <button id="doRegisterBtn">إنشاء حساب</button>
            <div id="regMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('loginTabBtn').addEventListener('click', () => {
            document.getElementById('loginTabBtn').classList.add('active');
            document.getElementById('registerTabBtn').classList.remove('active');
            document.getElementById('loginFormDiv').classList.add('active');
            document.getElementById('registerFormDiv').classList.remove('active');
        });

        document.getElementById('registerTabBtn').addEventListener('click', () => {
            document.getElementById('registerTabBtn').classList.add('active');
            document.getElementById('loginTabBtn').classList.remove('active');
            document.getElementById('registerFormDiv').classList.add('active');
            document.getElementById('loginFormDiv').classList.remove('active');
        });

        document.getElementById('doLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMsg');
            if (!email || !password) { msgDiv.innerText = 'الرجاء ملء جميع الحقول'; return; }
            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                if (error.code === 'auth/user-not-found') msgDiv.innerText = 'لا يوجد حساب';
                else if (error.code === 'auth/wrong-password') msgDiv.innerText = 'كلمة المرور غير صحيحة';
                else msgDiv.innerText = 'حدث خطأ';
            }
        });

        document.getElementById('doRegisterBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const msgDiv = document.getElementById('regMsg');
            if (!name || !email || !password) { msgDiv.innerText = 'املأ جميع الحقول'; return; }
            if (password.length < 6) { msgDiv.innerText = 'كلمة المرور 6 أحرف على الأقل'; return; }
            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: name });
                await firebase.database().ref(`users/${userCredential.user.uid}`).set({
                    username: name, email: email, bio: '', avatarUrl: '', followers: {}, following: {}, totalLikes: 0, createdAt: Date.now()
                });
                window.location.href = 'index.html';
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') msgDiv.innerText = 'البريد مستخدم';
                else msgDiv.innerText = 'حدث خطأ';
            }
        });
    });
</script>
</body>
</html>
