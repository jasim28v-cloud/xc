<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="loginPage">
    <div class="login-container">
        <h1>🎵 TikTok</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">دخول</button>
            <button class="tab" onclick="showTab('register')">تسجيل</button>
        </div>
        
        <div id="loginForm" class="form active">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg"></div>
        </div>
        
        <div id="registerForm" class="form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg"></div>
        </div>
    </div>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('home')">🏠</button>
        <button class="nav-btn" onclick="showSection('upload')">➕</button>
        <button class="nav-btn" onclick="showSection('profile')">👤</button>
    </div>
    
    <div id="homeSection" class="section active">
        <div id="videosList"></div>
    </div>
    
    <div id="uploadSection" class="section">
        <div class="upload-box" onclick="document.getElementById('videoFile').click()">
            📹 اضغط لاختيار فيديو
        </div>
        <input type="file" id="videoFile" accept="video/*" style="display:none">
        <textarea id="videoDesc" placeholder="وصف الفيديو..."></textarea>
        <button onclick="upload()">رفع</button>
        <div id="uploadStatus"></div>
    </div>
    
    <div id="profileSection" class="section">
        <div class="profile-card">
            <div class="avatar">👤</div>
            <h3 id="userName"></h3>
            <p id="userEmail"></p>
            <button onclick="logout()">تسجيل خروج</button>
        </div>
        <h4>فيديوهاتي</h4>
        <div id="myVideos"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
