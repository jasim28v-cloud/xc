<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | TikTok Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon-color: #fe2c55; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass-ui { background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { color: var(--neon-color) !important; text-shadow: 0 0 10px var(--neon-color); }
        .side-controls { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .glass-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .glass-btn:active { transform: scale(0.95); }
        .video-info { position: absolute; bottom: 100px; left: 20px; right: 80px; z-index: 50; }
        .video-author { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .author-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #fe2c55, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 2px solid white; }
        .author-name { font-weight: bold; font-size: 17px; cursor: pointer; }
        .follow-btn { background: #fe2c55; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 10px; cursor: pointer; border: none; color: white; }
        .video-desc { font-size: 14px; margin-bottom: 8px; }
        .video-music { font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 5px; }
        .comments-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-radius: 20px 20px 0 0; max-height: 70vh; overflow-y: auto; z-index: 200; transform: translateY(100%); transition: 0.3s; padding: 20px; }
        .comments-panel.open { transform: translateY(0); }
        .comment-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #fe2c55; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .comment-content { flex: 1; }
        .comment-username { font-weight: bold; font-size: 13px; }
        .comment-text { font-size: 13px; margin-top: 4px; }
        .comment-time { font-size: 10px; opacity: 0.5; margin-top: 4px; }
        .add-comment { display: flex; gap: 10px; padding: 15px; background: #1a1a1a; border-radius: 30px; margin-top: 10px; }
        .add-comment input { flex: 1; background: none; border: none; color: white; outline: none; }
        .search-panel { position: fixed; top: 0; left: 0; right: 0; background: #000; z-index: 300; padding: 60px 20px 20px; transform: translateY(-100%); transition: 0.3s; height: 100vh; overflow-y: auto; }
        .search-panel.open { transform: translateY(0); }
        .search-input { width: 100%; padding: 12px; border-radius: 30px; background: #222; border: none; color: white; margin-bottom: 20px; }
        .search-result { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .edit-profile-panel { position: fixed; top: 0; left: 0; right: 0; background: #000; z-index: 300; padding: 60px 20px 20px; transform: translateY(-100%); transition: 0.3s; }
        .edit-profile-panel.open { transform: translateY(0); }
        .profile-header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #fe2c55, #ff6b6b); }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; }
        .profile-stats { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-number { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.6; }
        .edit-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; background: #222; border: none; color: white; }
        .notifications-panel { position: fixed; top: 0; left: 0; right: 0; background: #000; z-index: 300; padding: 60px 20px 20px; transform: translateY(-100%); transition: 0.3s; height: 100vh; overflow-y: auto; }
        .notifications-panel.open { transform: translateY(0); }
        .notification-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: center; }
        .login-screen { position: fixed; inset: 0; z-index: 1000; background: linear-gradient(135deg, #0a0a0a, #1a1a2e); display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 32px; padding: 40px; width: 90%; max-width: 350px; border: 1px solid rgba(254,44,85,0.3); }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .login-card button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(135deg, #fe2c55, #ff6b6b); border: none; border-radius: 12px; color: white; cursor: pointer; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: #fe2c55; border-bottom-color: #fe2c55; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 0 24px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px; }
        .nav-item.active { color: #fe2c55; }
        .nav-icon { font-size: 24px; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 12px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 90; }
        .top-icon { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin: 0 8px; }
        .upload-area { border: 2px dashed #fe2c55; border-radius: 20px; padding: 40px; text-align: center; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1 class="text-2xl font-[Orbitron] neon-text text-center mb-6">SHΔDØW</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="text-red-500 text-sm text-center mt-2"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="text-red-500 text-sm text-center mt-2"></div>
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" style="display: none;">
    <div class="top-bar">
        <div><i class="fas fa-search top-icon" onclick="openSearch()"></i></div>
        <div><i class="fas fa-bell top-icon" onclick="openNotifications()"></i></div>
    </div>

    <main class="scroll-engine" id="video-stack">
        <div class="h-full flex items-center justify-center"><i class="fas fa-circle-notch fa-spin text-3xl neon-text"></i></div>
    </main>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><span class="nav-icon">🏠</span><span>الرئيسية</span></button>
        <button class="nav-item" onclick="switchTab('search')"><span class="nav-icon">🔍</span><span>بحث</span></button>
        <div id="upload-trigger" class="w-14 h-14 bg-gradient-to-r from-[#fe2c55] to-[#ff6b6b] rounded-full flex items-center justify-center cursor-pointer active:scale-90 transition-transform shadow-lg"><i class="fas fa-plus text-2xl"></i></div>
        <button class="nav-item" onclick="switchTab('notifications')"><span class="nav-icon">🔔</span><span>إشعارات</span></button>
        <button class="nav-item" onclick="openProfile()"><span class="nav-icon">👤</span><span>الملف</span></button>
    </div>

    <!-- لوحة التعليقات -->
    <div id="commentsPanel" class="comments-panel">
        <div class="flex justify-between items-center mb-4"><h3>التعليقات</h3><i class="fas fa-times cursor-pointer" onclick="closeComments()"></i></div>
        <div id="commentsList"></div>
        <div class="add-comment"><input type="text" id="commentInput" placeholder="أضف تعليقاً..."><button onclick="addComment()" class="neon-text">نشر</button></div>
    </div>

    <!-- لوحة البحث -->
    <div id="searchPanel" class="search-panel">
        <div class="flex justify-between items-center mb-4"><h3>بحث</h3><i class="fas fa-times cursor-pointer" onclick="closeSearch()"></i></div>
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن مستخدمين..." onkeyup="searchUsers()">
        <div id="searchResults"></div>
        <h4 class="mt-4 mb-2">نتائج البحث</h4>
        <div id="searchVideosResults"></div>
    </div>

    <!-- لوحة تعديل الملف الشخصي -->
    <div id="editProfilePanel" class="edit-profile-panel">
        <div class="flex justify-between items-center mb-4"><h3>تعديل الملف الشخصي</h3><i class="fas fa-times cursor-pointer" onclick="closeEditProfile()"></i></div>
        <div class="profile-header"><div class="profile-avatar-large" id="editAvatar" onclick="changeAvatar()">👤</div></div>
        <input type="text" id="editUsername" class="edit-input" placeholder="اسم المستخدم">
        <input type="text" id="editBio" class="edit-input" placeholder="السيرة الذاتية">
        <button onclick="saveProfile()" class="w-full bg-[#fe2c55] p-3 rounded-xl mt-4">حفظ التغييرات</button>
    </div>

    <!-- لوحة الإشعارات -->
    <div id="notificationsPanel" class="notifications-panel">
        <div class="flex justify-between items-center mb-4"><h3>الإشعارات</h3><i class="fas fa-times cursor-pointer" onclick="closeNotifications()"></i></div>
        <div id="notificationsList"></div>
    </div>

    <!-- لوحة الملف الشخصي -->
    <div id="profilePanel" class="fixed inset-0 bg-black z-[250] overflow-y-auto" style="display: none;">
        <div class="profile-header"><div class="profile-avatar-large" id="profileAvatarDisplay">👤</div><h2 id="profileNameDisplay" class="mt-4"></h2><p id="profileBioDisplay" class="text-sm opacity-70"></p></div>
        <div class="profile-stats"><div class="stat"><div class="stat-number" id="profileFollowers">0</div><div class="stat-label">متابع</div></div><div class="stat"><div class="stat-number" id="profileFollowing">0</div><div class="stat-label">يتابع</div></div><div class="stat"><div class="stat-number" id="profileVideos">0</div><div class="stat-label">فيديو</div></div></div>
        <button onclick="openEditProfile()" class="w-[90%] mx-auto block bg-white/10 p-2 rounded-xl mb-4">تعديل الملف الشخصي</button>
        <button onclick="logout()" class="w-[90%] mx-auto block bg-red-500/20 p-2 rounded-xl mb-4">تسجيل خروج</button>
        <h4 class="px-4 mb-2">فيديوهاتي</h4>
        <div id="profileVideosList" class="grid grid-cols-3 gap-1 p-1"></div>
        <i class="fas fa-times absolute top-5 right-5 text-2xl cursor-pointer" onclick="closeProfile()"></i>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
