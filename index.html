<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TikTok Clone - بلس</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- شاشة تسجيل الدخول - تصميم عصري -->
<div id="loginPage" class="login-page">
    <div class="login-overlay"></div>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 1.18.24V8.87a6.32 6.32 0 0 0-1.18-.1 6.34 6.34 0 0 0-6.33 6.33 6.34 6.34 0 0 0 10.86 4.5 6.34 6.34 0 0 0 1.88-4.5V8.22a8.09 8.09 0 0 0 4.7 1.55V6.69z" fill="white"/>
                </svg>
            </div>
            <h1>TikTok</h1>
            <p>شارك إبداعك مع العالم</p>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        
        <div id="loginForm" class="auth-form active">
            <div class="input-group">
                <span class="input-icon">📧</span>
                <input type="email" id="email" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="كلمة المرور">
            </div>
            <button class="auth-submit" onclick="login()">دخول</button>
            <div id="loginMsg" class="msg-error"></div>
        </div>
        
        <div id="registerForm" class="auth-form">
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" id="regName" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
                <span class="input-icon">📧</span>
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="regPass" placeholder="كلمة المرور">
            </div>
            <button class="auth-submit" onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="msg-error"></div>
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي - تصميم حديث -->
<div id="app" style="display:none">
    <!-- شريط علوي -->
    <div class="top-bar">
        <div class="logo-small">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 1.18.24V8.87a6.32 6.32 0 0 0-1.18-.1 6.34 6.34 0 0 0-6.33 6.33 6.34 6.34 0 0 0 10.86 4.5 6.34 6.34 0 0 0 1.88-4.5V8.22a8.09 8.09 0 0 0 4.7 1.55V6.69z" fill="white"/>
            </svg>
            <span>TikTok</span>
        </div>
        <div class="top-icons">
            <button class="top-icon">🔍</button>
            <button class="top-icon">📥</button>
        </div>
    </div>
    
    <!-- الفيديوهات -->
    <div id="videosContainer" class="videos-container"></div>
    
    <!-- شريط سفلي -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">الرئيسية</span>
        </button>
        <button class="nav-item" onclick="switchTab('upload')">
            <span class="nav-icon">➕</span>
            <span class="nav-label">رفع</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">الملف</span>
        </button>
    </div>
    
    <!-- صفحة الرفع -->
    <div id="uploadPanel" class="upload-panel" style="display:none">
        <div class="upload-header">
            <h3>رفع فيديو جديد</h3>
            <button class="close-upload" onclick="switchTab('home')">✕</button>
        </div>
        <div class="upload-area" onclick="document.getElementById('videoFile').click()">
            <div class="upload-icon-big">📹</div>
            <p>اضغط لاختيار فيديو</p>
            <span class="upload-hint">MP4, MOV, يصل إلى 100MB</span>
        </div>
        <input type="file" id="videoFile" accept="video/*" style="display:none">
        <textarea id="videoDesc" placeholder="اكتب وصفاً للفيديو..."></textarea>
        <button class="upload-btn" onclick="uploadVideo()">رفع الفيديو</button>
        <div id="uploadStatus" class="upload-status"></div>
    </div>
    
    <!-- صفحة الملف الشخصي -->
    <div id="profilePanel" class="profile-panel" style="display:none">
        <div class="profile-cover"></div>
        <div class="profile-info">
            <div class="profile-avatar" id="profileAvatar">
                <span>👤</span>
            </div>
            <h3 id="profileName">user</h3>
            <p id="profileEmail">email@example.com</p>
            <div class="profile-stats">
                <div class="stat">
                    <strong id="videosCount">0</strong>
                    <span>فيديو</span>
                </div>
                <div class="stat">
                    <strong id="followersCount">0</strong>
                    <span>متابع</span>
                </div>
                <div class="stat">
                    <strong id="followingCount">0</strong>
                    <span>يتابع</span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>
        <div class="profile-tabs">
            <button class="profile-tab active">فيديوهاتي</button>
        </div>
        <div id="myVideosList" class="my-videos-grid"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
